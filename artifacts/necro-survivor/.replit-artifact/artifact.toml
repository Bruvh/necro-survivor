kind = "web"
previewPath = "/"
title = "NECRO SURVIVOR"
version = "1.0.0"
id = "artifacts/necro-survivor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23173

[services.development]
run = "pnpm --filter @workspace/necro-survivor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/necro-survivor", "run", "build" ]
publicDir = "artifacts/necro-survivor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23173"
BASE_PATH = "/"
